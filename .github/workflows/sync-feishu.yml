name: sync-feishu

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. Sunday 19:30 UTC = Monday 03:30 Asia/Shanghai.
    - cron: "30 19 * * 0"

permissions:
  contents: write

concurrency:
  group: rule-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Check Feishu upstream
        run: python -m egloon_rule_hub refresh-txt-sources

      - name: Detect upstream update
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- Source/TXT/Feishu.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild Feishu rule artifacts
        if: steps.changes.outputs.changed == 'true'
        run: python -m egloon_rule_hub bootstrap

      - name: Commit generated changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md ATTRIBUTION.md Rule dist Source/TXT/Feishu.txt
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh Feishu rules"
          git push
