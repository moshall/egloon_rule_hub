name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Validate catalog
        run: python -m egloon_rule_hub validate-catalog

      - name: Render generated artifacts
        run: python -m egloon_rule_hub bootstrap
