name: sync-rules

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC. 19:30 UTC = 03:30 Asia/Shanghai next day.
    - cron: "30 19 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Refresh TXT sources
        run: python -m egloon_rule_hub refresh-txt-sources

      - name: Bootstrap repository artifacts
        run: python -m egloon_rule_hub bootstrap

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md ATTRIBUTION.md Rule dist Source/TXT
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh generated rule artifacts"
          git push
