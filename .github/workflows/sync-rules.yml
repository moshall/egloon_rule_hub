name: sync-rules

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install --upgrade pip && pip install -e .

      - name: Run tests
        run: python -m unittest discover -s tests -p 'test_*.py' -t . -v

      - name: Bootstrap repository artifacts
        run: python -m egloon_rule_hub bootstrap

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs dist
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh generated rule docs and manifests"
          git push
