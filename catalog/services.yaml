all_targets: &all_targets [egern, loon, clash, quanx, shadowrocket]

services:
  OpenAI:
    enabled: true
    targets: *all_targets
    sources:
      - source: blackmatrix7
        path: rule/Clash/OpenAI/OpenAI.yaml
        format: clash_yaml
        priority: 100
      - source: blackmatrix7
        path: rule/Loon/OpenAI/OpenAI.list
        format: loon_list
        priority: 90
      - source: acl4ssr
        path: Clash/Ruleset/OpenAi.list
