all_targets: &all_targets [egern, loon, clash, quantumultx, shadowrocket]

bundles:
  ai:
    enabled: true
    targets: *all_targets
    services: [OpenAI, Claude, Gemini, BardAI, Twitter, Copilot, Manus, GoogleExtended, ClaudeExtended]

  google:
    enabled: true
    targets: *all_targets
    services: [Google, GoogleVoice, GoogleEarth, GoogleSearch, YouTube, YouTubeMusic]

  social:
    enabled: true
    targets: *all_targets
    services: [Twitter, Instagram, Facebook, Reddit, TikTok, Tumblr, Twitch, Telegram, WhatsApp]

  streaming:
    enabled: true
    targets: *all_targets
    services: [Netflix, Spotify, HBO, HBOAsia, HBOHK, HBOUSA, FOXNOW, FOXPlus, Fox, SkyGO, Emby]

  gaming:
    enabled: true
    targets: *all_targets
